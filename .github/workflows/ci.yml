# E0.1 CI pipeline: unit → snapshot → UI-smoke lanes + dormant TestFlight lane.
# Portfolio note: the docs consume "ci-templates" reusable workflows, but no portfolio
# ci-templates repo exists yet — this workflow is authored in-repo and is the seed to
# contribute back once a second consumer appears (implementation-plan E0.1).
#
# Cost discipline: this repo is PRIVATE, so macOS runners bill at 10x. Package units
# run on Linux (official swift container, 1x); the three app lanes share one
# build-for-testing product on a single macOS job; superseded runs are cancelled.
name: CI

# Docs-only pushes skip CI entirely (macOS minutes are 10x on this private repo).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"

# Cancel superseded runs on branches/PRs, but never cancel main (a second merge must
# not abort an in-flight TestFlight upload once that lane activates).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── StreakEngine release gate (Epic 1 DoD; test-suite §5.1/§2) ──────────────
  # The E1.1–E1.4 edge-case suite (streak math, clock-integrity guard, slip/undo,
  # Reduce adherence) as an explicitly NAMED, merge-blocking release gate: it runs on
  # every push/PR, and the TestFlight lane refuses to upload without it (`needs`).
  # If branch protection is ever enabled (operator call — it would block the documented
  # direct-push-to-main session workflow for non-admins), register the job name
  # "Release gate · StreakEngine edge-case suite" as the required status check.
  # Coverage floors are enforced mechanically per test-suite §2: line coverage ≥98%
  # package-wide, region (branch-arm) coverage ≥95% on the clock-guard and slip/undo
  # files — Swift emits region coverage, not classic branch pairs, so regions are the
  # branch bar. Linux container: 1x minutes; StreakEngine is Foundation-only by rule.
  streakengine-release-gate:
    name: "Release gate · StreakEngine edge-case suite"
    runs-on: ubuntu-latest
    container: swift:6.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: swift test (coverage-instrumented)
        run: swift test --package-path Packages/StreakEngine --enable-code-coverage
      - name: Coverage floor (lines ≥98% package-wide; regions ≥95% on guard + slip/undo)
        working-directory: Packages/StreakEngine
        # The container's default step shell is dash (`sh -e`); pipefail is a bashism.
        shell: bash
        run: |
          set -euo pipefail
          LLVM_COV="$(dirname "$(readlink -f "$(command -v swift)")")/llvm-cov"
          "$LLVM_COV" report .build/debug/StreakEnginePackageTests.xctest \
            -instr-profile=.build/debug/codecov/default.profdata \
            Sources/ | tee coverage-report.txt
          awk '
            $1 == "TOTAL" {
              seenTotal = 1
              lineCov = ($8 - $9) / $8 * 100
              printf "package line coverage: %.2f%% (floor 98)\n", lineCov
              if (lineCov < 98) { print "::error::StreakEngine package line coverage fell below the 98% floor (test-suite §2)"; fail = 1 }
            }
            $1 == "StreakCalculator.swift" || $1 == "SlipTransition.swift" {
              seenFiles += 1
              regionCov = ($2 - $3) / $2 * 100
              printf "%s region coverage: %.2f%% (floor 95)\n", $1, regionCov
              if (regionCov < 95) { printf "::error::%s region coverage fell below the 95%% floor (test-suite §2)\n", $1; fail = 1 }
            }
            END {
              if (!seenTotal) { print "::error::coverage report had no TOTAL row — gate cannot measure, failing closed"; exit 2 }
              if (seenFiles != 2) { print "::error::expected StreakCalculator.swift AND SlipTransition.swift in the report — a rename must update this gate"; exit 2 }
              exit fail
            }
          ' coverage-report.txt

  package-units:
    name: "Package units · ${{ matrix.package }}"
    runs-on: ubuntu-latest
    container: swift:6.1-noble
    strategy:
      fail-fast: false
      matrix:
        # StreakEngine runs in its own named release-gate job above (with coverage floors),
        # not here — one lane per package, no double spend.
        package: [WidgetToolkit, PaywallKit]
    steps:
      - uses: actions/checkout@v4
      - name: swift test (coverage-instrumented)
        run: swift test --package-path "Packages/${{ matrix.package }}" --enable-code-coverage

      # WidgetToolkit's test-suite §2 floor (90% lines). §7's preamble binds it NOW: "the §2
      # floors apply to the FIRST merged version of every module, not a future aspiration" —
      # and E6.1 is WidgetToolkit's first real content. Same shape as the StreakEngine gate
      # above (ubuntu, 1x — no macOS minutes).
      #
      # FAILS CLOSED on an unmeasurable report, which needs TWO guards, not one. When the
      # `Sources/` filter MATCHES, llvm-cov shortens each path to a bare basename. When it MISSES
      # (a rename, a restructure), llvm-cov does NOT emit an empty report — it warns on stderr,
      # then reports every file in the mapping (Tests/**, .build/**) WITH a valid TOTAL row and
      # exit 0. So a present TOTAL row proves nothing on its own: test files are ~100% covered by
      # construction, and a polluted TOTAL would drift comfortably above the floor while the
      # source coverage it claims to measure rots unseen. Hence the pollution guard below.
      - name: Coverage floor (WidgetToolkit — lines ≥90%)
        if: matrix.package == 'WidgetToolkit'
        working-directory: Packages/WidgetToolkit
        # The container's default step shell is dash (`sh -e`); pipefail is a bashism.
        shell: bash
        run: |
          set -euo pipefail
          LLVM_COV="$(dirname "$(readlink -f "$(command -v swift)")")/llvm-cov"
          "$LLVM_COV" report .build/debug/WidgetToolkitPackageTests.xctest \
            -instr-profile=.build/debug/codecov/default.profdata \
            Sources/ | tee coverage-report.txt
          awk '
            $1 ~ /^(Tests|\.build)\// {
              print "::error::coverage report contains non-Sources rows (" $1 ") — the Sources/ path filter did not apply; gate cannot measure, failing closed"
              polluted = 1
            }
            $1 == "TOTAL" {
              seenTotal = 1
              lineCov = ($8 - $9) / $8 * 100
              printf "package line coverage: %.2f%% (floor 90)\n", lineCov
              if (lineCov < 90) { print "::error::WidgetToolkit package line coverage fell below the 90% floor (test-suite §2)"; fail = 1 }
            }
            END {
              if (!seenTotal) { print "::error::coverage report had no TOTAL row — gate cannot measure, failing closed"; exit 2 }
              if (polluted) { exit 2 }
              exit fail
            }
          ' coverage-report.txt

      # PaywallKit's test-suite §2 floor (90% lines) — landed with the package's first real
      # content (E7.1, Session 23), same §7 first-merged-version rule and the same fail-closed
      # shape as the WidgetToolkit gate above (pollution guard + TOTAL-row guard both kept;
      # the "thin SDK-adapter shims exempt" clause is moot — the adapter is app-side and the
      # package is 100% pure logic).
      - name: Coverage floor (PaywallKit — lines ≥90%)
        if: matrix.package == 'PaywallKit'
        working-directory: Packages/PaywallKit
        # The container's default step shell is dash (`sh -e`); pipefail is a bashism.
        shell: bash
        run: |
          set -euo pipefail
          LLVM_COV="$(dirname "$(readlink -f "$(command -v swift)")")/llvm-cov"
          "$LLVM_COV" report .build/debug/PaywallKitPackageTests.xctest \
            -instr-profile=.build/debug/codecov/default.profdata \
            Sources/ | tee coverage-report.txt
          awk '
            $1 ~ /^(Tests|\.build)\// {
              print "::error::coverage report contains non-Sources rows (" $1 ") — the Sources/ path filter did not apply; gate cannot measure, failing closed"
              polluted = 1
            }
            $1 == "TOTAL" {
              seenTotal = 1
              lineCov = ($8 - $9) / $8 * 100
              printf "package line coverage: %.2f%% (floor 90)\n", lineCov
              if (lineCov < 90) { print "::error::PaywallKit package line coverage fell below the 90% floor (test-suite §2)"; fail = 1 }
            }
            END {
              if (!seenTotal) { print "::error::coverage report had no TOTAL row — gate cannot measure, failing closed"; exit 2 }
              if (polluted) { exit 2 }
              exit fail
            }
          ' coverage-report.txt

  # ── E2.2 acceptance lint: the repository is the sole SwiftData importer ──────
  # implementation-plan E2.2: "repository is the sole SwiftData importer outside
  # trivial @Query lists (enforced by a lint/grep CI check)". Allowed importers:
  # App/Sources/Persistence/** (models, store factory, repository) and Tests/**.
  # No trivial-@Query view exists yet; when one lands (Epic 5+), extending this
  # allowlist is a deliberate, reviewed change to this job.
  swiftdata-importer-lint:
    name: "E2.2 lint · repository is the sole SwiftData importer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep gate
        run: |
          set -euo pipefail
          violations=$(grep -rl --include='*.swift' 'import SwiftData' . \
            | grep -vE '^(\./)?(App/Sources/Persistence/|Tests/)' || true)
          if [ -n "$violations" ]; then
            echo "::error::import SwiftData outside App/Sources/Persistence/ + Tests/ (E2.2 acceptance):"
            echo "$violations"
            exit 1
          fi
          echo "sole-importer check passed"

  app:
    name: "App lanes · build + unit + snapshot + UI smoke"
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26 + runner facts
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM clones
        uses: actions/cache@v4
        with:
          path: .spm-packages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      # Deterministic pick (E3.2, test-suite §3.3 "one pinned simulator runtime +
      # device model"): highest-versioned iOS runtime, then the preferred device
      # order below — the same runner image always yields the same simulator, and an
      # image bump that changes the pick is visible in this step's log next to any
      # snapshot drift it causes. (Snapshot geometry is additionally pinned in-test
      # via ViewImageConfig, so the booted device model only supplies the runtime.)
      - name: Pick iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | jq -r '
            [.devices | to_entries[]
             | select(.key | contains("iOS"))
             | {runtime: .key, devices: [.value[] | select(.isAvailable) | select(.name | startswith("iPhone"))]}
            ] | sort_by(.runtime) | reverse
              | map(.devices | sort_by(. as $d |
                  [(["iPhone 17 Pro", "iPhone 17", "iPhone 16 Pro", "iPhone 16"]
                    | index($d.name)) // 99, $d.name]))
              | flatten | .[0].udid // empty')
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator on this runner"
            xcrun simctl list devices
            exit 1
          fi
          echo "Pinned pick: $(xcrun simctl list devices available | grep "$UDID" || echo "$UDID")"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true

      - name: Build for testing
        id: build
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Unhooked.xcodeproj \
            -scheme Unhooked \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -clonedSourcePackagesDirPath .spm-packages \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=-

      # The three E0.1 lanes run independently so a red lane never hides another
      # lane's result (each still fails the job).
      - name: Unit lane (UnhookedTests)
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Unhooked.xcodeproj \
            -scheme Unhooked \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:UnhookedTests \
            -resultBundlePath Results/unit.xcresult \
            CODE_SIGN_IDENTITY=-

      - name: Snapshot lane (UnhookedSnapshotTests)
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Unhooked.xcodeproj \
            -scheme Unhooked \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:UnhookedSnapshotTests \
            -resultBundlePath Results/snapshot.xcresult \
            CODE_SIGN_IDENTITY=-

      - name: UI smoke lane (UnhookedUITests)
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Unhooked.xcodeproj \
            -scheme Unhooked \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:UnhookedUITests \
            -resultBundlePath Results/uismoke.xcresult \
            CODE_SIGN_IDENTITY=-

      # Recorded-but-missing snapshot references and xcresult bundles land here so a
      # red run's outputs can be committed/inspected without a local macOS machine.
      - name: Upload test outputs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: |
            Results
            Tests/**/__Snapshots__
          if-no-files-found: ignore
          retention-days: 7

  # ── TestFlight lane (E0.1) ──────────────────────────────────────────────────
  # DORMANT until Gate G0 (rename) clears: bundle ID, App Store Connect app, and
  # signing (fastlane match) may only be created under the cleared name
  # (feasibility §7 condition 1; architecture naming note). A broken test blocks
  # upload structurally via `needs`. Activation: provision the secrets named below,
  # then this lane runs on every merge to main (roadmap §3: internal TestFlight
  # continuous from Week 0 — blocked on the operator-owned rename).
  testflight-gate:
    name: TestFlight gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          if [ -n "$ASC_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=TestFlight lane dormant::Blocked on Gate G0 (rename). Provision secrets ASC_API_KEY_P8_BASE64, ASC_KEY_ID, ASC_ISSUER_ID, MATCH_GIT_URL, MATCH_PASSWORD after the rename clears — see fastlane/Fastfile and docs/resume-prompt.md."
          fi

  testflight:
    name: TestFlight upload (fastlane beta)
    needs: [streakengine-release-gate, package-units, swiftdata-importer-lint, app, testflight-gate]
    if: needs.testflight-gate.outputs.enabled == 'true'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: fastlane beta
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # One-shot signing bootstrap flag (repo Variable, not a secret). Set to "true"
          # for the first TestFlight run so match generates+pushes certs, then delete it.
          MATCH_BOOTSTRAP: ${{ vars.MATCH_BOOTSTRAP }}
        run: fastlane beta

  slack-notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [streakengine-release-gate, package-units, app, testflight-gate, testflight]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          # An incoming-webhook URL is a credential — push protection blocks it inline.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          TEXT=$(printf '✅ Build succeeded\n\nRepo: %s\nWorkflow: %s\nTime: %s\nCommit: %s - %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${GITHUB_SHA:0:7}" "$MSG")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack success notification failed"

      - name: Notify Slack on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          NEEDS_JSON: ${{ toJson(needs) }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          FAILED_JOBS=$(printf '%s' "$NEEDS_JSON" | jq -r '[to_entries[] | select(.value.result == "failure") | .key] | join(", ")')
          TEXT=$(printf '❌ Build failed\n\nRepo: %s\nWorkflow: %s\nJob: %s\nBranch: %s\nActor: %s\nCommit: %s - %s\nRun: %s\nTime: %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$FAILED_JOBS" "$GITHUB_REF_NAME" "$GITHUB_ACTOR" \
            "${GITHUB_SHA:0:7}" "$MSG" \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "$(date -u '+%Y-%m-%d %H:%M UTC')")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack failure notification failed"
