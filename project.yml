# XcodeGen project definition — the .xcodeproj is generated, never committed.
# Generate with: xcodegen generate   (CI does this on every run)
#
# ── Gate G0 (rename): CLEARED 2026-07-08 ─────────────────────────────────────
# "Ballast" (org com.beyondkaira) is the REAL registered identity — App ID,
# widget App ID, App Group, and iCloud container registered in the developer
# portal 2026-07-08 (see Shared/Sources/AppIdentifiers.swift's dated header;
# the former dev.placeholder.quitwidget ids were never registered). The old
# sweep list is retired; "Unhooked" survives only as internal target/scheme
# names. STILL OPERATOR-OWNED: the App Store Connect listing + in-app-purchase
# products (ProductCatalog SKUs) do not exist yet — ASC product creation is a
# sandbox-verification-time task (operator-expected §7/§8), and the product
# ids in App/Sources/Monetization/ProductCatalog.swift must match exactly then.
# ─────────────────────────────────────────────────────────────────────────────
name: Unhooked
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"

packages:
  # Portfolio shared packages (architecture §14). No portfolio repos exist yet, so
  # these live in-repo as local stub packages; extraction to their own repos happens
  # when a second consumer appears (implementation-plan §Portfolio Packages).
  StreakEngine:
    path: Packages/StreakEngine
  WidgetToolkit:
    path: Packages/WidgetToolkit
  PaywallKit:
    path: Packages/PaywallKit
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    # EXACT pin (E7.1 app half, R23.5/R24.8): 5.80.3 re-confirmed latest at
    # session open (released 2026-07-08; three seats verified independently
    # against the GitHub releases API). Same rationale as the pins below: no
    # committed Package.resolved, so a range re-resolves every CI run. Link
    # product "RevenueCat" ONLY (never RevenueCatUI / the
    # CustomEntitlementComputation variant); its test-only deps (nimble,
    # snapshot-testing 1.18.9) are pruned by SPM — our SnapshotTesting 1.19.3
    # pin is unaffected (reproduced with `swift package resolve` pre-push).
    # App target + UnhookedTests (Contract_RevenueCat) ONLY — NEVER the widget
    # extension (a payments/network SDK has no business in a pre-unlock
    # surface; the TelemetryDeck placement precedent).
    exactVersion: "5.80.3"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    # EXACT pin (E3.2): no Package.resolved is committed (the .xcodeproj is
    # generated), so a `from:` range re-resolves on every CI run — and 1.18.x vs
    # 1.19.x is a behavioral cliff (the swift-testing `.snapshots(record:)` trait is
    # a silent no-op in 1.18, functional from 1.19). Version bumps are deliberate
    # commits per test-suite §3.3's re-record discipline.
    exactVersion: "1.19.3"
  Superwall:
    url: https://github.com/superwall/Superwall-iOS
    # EXACT pin (E7.2, R25.10): 4.16.1 verified latest at session open
    # (released 2026-07-01; GitHub releases API + the tagged manifest). NOT a
    # churn-avoidance downgrade candidate: 4.16.1 IS the Xcode-26.4 build fix
    # (CHANGELOG — "Makes sure that the compiler directive is correct … so
    # that the SDK builds in Xcode version 26.4"), and our billed lane is
    # macos-26. Product/module = "SuperwallKit". Transitive:
    # superscript-ios-next .exact(1.0.14), which pulls the checksummed
    # `libcel.xcframework` binary (~95MB, Apple-only slices) at resolve time
    # — the full pin graph reproduced conflict-free locally pre-push (our
    # four exact pins win; R24.8 discipline). App target ONLY — never the
    # widget extension (pre-unlock surface), and NOT UnhookedTests this
    # session (no SDK-value contract test; the seam is pinned via the house
    # FakePaywallPresenter — R25.10).
    exactVersion: "4.16.1"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    # EXACT pin (E8.1): latest STABLE — 3.0.0 exists only as betas (docs-checked
    # against the official repo/releases, Session 15). Same rationale as the
    # SnapshotTesting pin above: no committed Package.resolved means a range
    # re-resolves on every CI run. App target only — the widget extension never
    # fires analytics (ADR-6/ADR-8).
    exactVersion: "2.14.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "UH7MXG7Z94"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only, v1 (architecture header)
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Unhooked:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - Shared/Sources
      # App/Resources/Content stays unbundled (Phase 4 drafts, inert until
      # clinician/legal sign-off; see Content/REVIEW.md) — EXCEPT the consumed files
      # below. Each ships from here once its named consuming epic renders the shipping
      # file (never copies — test-suite §3.2), moving its tone review up the operator's
      # sign-off queue: panicScript.json (E3.2 panic flow), slipCopy.json (E4.1 slip
      # flow + undo).
      - path: App/Resources/Content/panicScript.json
        buildPhase: resources
      - path: App/Resources/Content/slipCopy.json
        buildPhase: resources
      # E5.1 (age gate) is the consuming epic for the three below: ageGateCopy.json is
      # its audited copy table; the blocked surface renders safetyCopy's resourcesScreen
      # framing + the verified appliesTo-all helpline rows. Bundling moves safetyCopy/
      # helplines tone+clinician review up the operator queue (operator-expected §3).
      - path: App/Resources/Content/ageGateCopy.json
        buildPhase: resources
      - path: App/Resources/Content/safetyCopy.json
        buildPhase: resources
      - path: App/Resources/Content/helplines.json
        buildPhase: resources
      # E5.2 (onboarding quiz) is the consuming epic: quizConfig.json is the quiz
      # definition (ADR-9 bundled static content) AND its ONE audited copy table —
      # every string DRAFT/founder-owned (operator-expected §3), lexicon-scanned by
      # SlipLexiconTests on every run.
      - path: App/Resources/Content/quizConfig.json
        buildPhase: resources
      # E5.3 (personalized summary) is the consuming epic: summaryCopy.json is the
      # summary screen's ONE audited copy table — deliberately its own file, never a
      # quizConfig steps[] entry (Architect Q1, Session 18) — every string DRAFT/
      # founder-owned (operator-expected §3), lexicon-scanned by SlipLexiconTests.
      - path: App/Resources/Content/summaryCopy.json
        buildPhase: resources
      # E6.2 (widget feed) is the consuming epic: the writer maps each quit's milestone
      # ladder (elapsed-hour offsets ONLY — titles/bodies never reach the pre-unlock
      # widget feed) from this table. Bundling makes its DRAFT copy TestFlight-shipping
      # content (E9's dashboard is the titles' first renderer), moving its tone review
      # up the operator queue (operator-expected §3) — the panicScript/slipCopy
      # precedent.
      - path: App/Resources/Content/milestones.json
        buildPhase: resources
      # E7.1 (Session 24) is the consuming epic: paywallCopy.json is the bundled
      # default paywall's ONE audited copy table (R24.9 — the summaryCopy.json
      # precedent): every string DRAFT/founder-owned (operator-expected §3),
      # dual-lexicon-scanned by PaywallCopyTests on every run; prices are NEVER
      # stored in it (the %@ templates bind ProductCatalog's control-arm
      # constants — pricing is config, not copy). NOTE: Ballast.storekit is
      # deliberately NOT here — it is a UnhookedTests resource (a dev/test
      # artifact must never ship in the app bundle).
      - path: App/Resources/Content/paywallCopy.json
        buildPhase: resources
      # AppIcon is the brandkit single-size set (light + dark + tinted 1024): actool
      # generates every size, incl. the iPad 152/167 App Store validation requires
      # even for an iPhone-only app (upload error 90023 without it). The light 1024
      # is alpha-stripped — the marketing icon must not carry an alpha channel.
      - App/Resources/Assets.xcassets
    dependencies:
      - target: UnhookedWidgets
      - package: StreakEngine
      - package: WidgetToolkit
      - package: PaywallKit
      - package: TelemetryDeck
      # E7.1 app half: DORMANT behind RevenueCatConfiguration.revenueCatAPIKey
      # (empty ⇒ configure never runs, zero network — the TelemetryDeck
      # precedent). Explicit product: purchases-ios vends several SPM products;
      # only the core SDK is wanted.
      - package: RevenueCat
        product: RevenueCat
      # E7.2: DORMANT behind SuperwallConfiguration.superwallAPIKey (empty ⇒
      # configure never runs, zero network — the RC precedent, R25.2).
      # Explicit product: the package vends one library, but XcodeGen links
      # nothing without the sub-key. App target ONLY (R25.10).
      - package: Superwall
        product: SuperwallKit
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Ballast
        # XcodeGen hardcodes CFBundleVersion "1" in generated plists unless told
        # otherwise, silently swallowing gym's CURRENT_PROJECT_VERSION xcargs — the
        # first TestFlight build shipped as bundle version '1' and every later upload
        # collided with it (ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE). Route both
        # version fields through the build settings so the per-run override lands.
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Portrait-only is a product decision (lock-screen widget wedge, one-hand
        # panic path). iPhone-only apps still install on iPad in compatibility mode,
        # where App Store validation (90474) demands either all four orientations for
        # multitasking or an explicit fullscreen opt-out — this is the opt-out.
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: App/Unhooked.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beyondkaira.ballast.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beyondkaira.ballast
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIconCalendar AppIconTimer"

  UnhookedWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets/Sources
      - Shared/Sources
    dependencies:
      # E6.2: Shared/Sources now compiles the family views/composer, which import
      # WidgetToolkit (planner/entries) and StreakEngine (the ONE money formula —
      # deliberate deviation from the inherited list's WidgetToolkit-only minimum,
      # recorded in the Session 21 ledger: formula parity beats duplicating money
      # math in the extension). Without these the extension build fails with
      # "no such module" — a burned billed run.
      - package: WidgetToolkit
      - package: StreakEngine
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Ballast Widgets
        # Same version routing as the app target — App Store validation requires the
        # extension's CFBundleVersion to match its host app's.
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/UnhookedWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beyondkaira.ballast.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beyondkaira.ballast.widgets

  UnhookedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/Unit
      # E7.1 (R24.5): the StoreKitTest configuration is a TEST-bundle resource
      # — MonetizationConfigTests parse-pins its prices/trials against MVP §6
      # and ProductCatalog; it must never ship in the app bundle (dev/test
      # artifact). The runtime SKTestSession tier stays deferred to the named
      # StoreKitTest/RC-sandbox contract session.
      - path: App/Resources/Ballast.storekit
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Unhooked
      - package: StreakEngine
      - package: WidgetToolkit
      - package: PaywallKit
      # E7.1: Contract_RevenueCat constructs REAL SDK values via the public
      # "unit testing" inits (5.80.3-source-verified) — value construction
      # only, zero network (configure is never called by any test).
      - package: RevenueCat
        product: RevenueCat

  UnhookedSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/Snapshot
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Unhooked
      - package: SnapshotTesting
      # E3.2: the panic-flow snapshot fixtures conform to ClockProviding, whose
      # MonotonicNow value type lives in StreakEngine.
      - package: StreakEngine
      # E6.2: the widget family snapshot fixtures construct StreakWidgetEntry values
      # (MANDATORY, not conditional — the panel's budget adversary flagged the missing
      # dep as the primary burned-run threat).
      - package: WidgetToolkit

  UnhookedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Unhooked

schemes:
  Unhooked:
    build:
      targets:
        Unhooked: all
    test:
      gatherCoverageData: true
      targets:
        - UnhookedTests
        - UnhookedSnapshotTests
        - UnhookedUITests
